<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Day 5 Writing | Word Order</title>

<style>
body{
  font-family:"Hiragino Maru Gothic ProN","Hiragino Maru Gothic",sans-serif;
  background:#fff9e6;
  padding:20px;
  text-align:center;
  font-size:20px;
}

h1{
  font-size:32px;
  margin-bottom:20px;
}

.frame{
  max-width:900px;
  margin:auto;
  background:#ffffff;
  border:3px solid #f2c94c;
  border-radius:16px;
  padding:24px;
}

#jp{
  font-size:26px;
  font-weight:bold;
  margin-bottom:20px;
}

.row{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:10px;
  margin:16px 0;
}

#answerRow{
  min-height:80px;
  border:3px dashed #bbb;
  border-radius:12px;
  padding:12px;
}

.card{
  background:#e6f5e6;
  padding:14px 18px;
  border-radius:12px;
  font-size:24px;
  font-weight:bold;
  cursor:pointer;
  user-select:none;
  box-shadow:2px 2px 6px rgba(0,0,0,.2);
}

button{
  padding:12px 24px;
  font-size:20px;
  border-radius:12px;
  margin:6px;
}

#message{
  font-size:24px;
  font-weight:bold;
  height:32px;
  margin-top:10px;
}

#nextBtn,
#speakBtn{
  display:none;
}

canvas{
  position:fixed;
  inset:0;
  pointer-events:none;
}
</style>
</head>

<body>

<h1>Day 5 Writing – Word Order</h1>

<div class="frame">
  <div id="jp"></div>

  <div class="row" id="answerRow"></div>
  <div class="row" id="cardRow"></div>

  <button onclick="checkAnswer()">Check</button>
  <button onclick="shuffleCards()">Shuffle 🔀</button>
  <button id="nextBtn" onclick="nextQ()">Next ▶</button>
  <button id="speakBtn" onclick="speak()">🔊 音声を聞く</button>
  <button onclick="makePDF()">📄 PDF</button>

  <div id="message"></div>
</div>

<canvas id="confetti"></canvas>

<script>
const questions = [

{jp:"おもちゃ売り場がどこにあるか教えていただけますか。",en:"Could you tell me where the toy section is?"},

{jp:"これは私が昨日、頭痛のために飲んだ薬です。",en:"This is the medicine that I took for my headache yesterday."},

{jp:"ジャックに和英辞典を買う必要があると伝えてください。",en:"Please tell Jack that he needs to buy a Japanese-English dictionary."},

{jp:"秋はハイキングに行くのに一番良い季節です。",en:"Fall is the best season to go hiking."},

{jp:"私はいとこの結婚式に招待されました。",en:"I was invited to my cousin's wedding."},

{jp:"この俳優が誰か知っていますか。",en:"Do you know who this actor is?"},

{jp:"ロンドンに行くためにどの飛行機に乗ればよいのかわかりません。",en:"I don't know which plane to take to London."},

{jp:"数学は去年ホワイト先生によってそのクラスに教えられました。",en:"Math was taught to the class by Mr. White last year."},

{jp:"あなたがどのテレビ番組が好きなのか知りません。",en:"I don't know which TV program you like."},

{jp:"どの薬が胃痛に効くのか教えてもらえますか。",en:"Can you tell me which medicine works for a stomachache?"},

{jp:"このセーターは祖母によって編まれました。",en:"This sweater was knitted by my grandmother."},

{jp:"この計画にいくらかかるのか知りたいです。",en:"I want to know how much this project will cost."},

{jp:"あなたの兄弟がどんなお菓子が好きか知っていますか。",en:"Do you know what kind of snacks your brother likes?"},

{jp:"この教科書が誰のものか知っている人はいますか。",en:"Does anyone know whose textbook this is?"},

{jp:"どの言語を学びたいのか教えてもらえますか。",en:"Can you tell me which language you want to learn?"},

{jp:"私はこの病院でその看護師を一度も見たことがありません。",en:"I have never seen that nurse in this hospital."}

];

let cur=0;

/* ⭐ カンマ・ピリオドを単語扱い */
function wordsOf(i){
  return questions[i].en
    .replace(/([.,?])/g," $1 ")
    .trim()
    .split(/\s+/);
}

function loadQ(){
  message.textContent="";
  nextBtn.style.display="none";
  speakBtn.style.display="none";
  jp.textContent=(cur+1)+") "+questions[cur].jp;
  answerRow.innerHTML="";
  cardRow.innerHTML="";

  shuffle(wordsOf(cur)).forEach(w=>{
    const c=document.createElement("div");
    c.className="card";
    c.textContent=w;
    c.onclick=()=>toggle(c);
    cardRow.appendChild(c);
  });
}

function toggle(card){
  if(card.parentElement.id==="cardRow"){
    answerRow.appendChild(card);
  }else{
    cardRow.appendChild(card);
  }
}

/* ⭐ スペース完全一致修正版 */
function checkAnswer(){
  const user=[...answerRow.children]
    .map(c=>c.textContent)
    .join(" ")
    .replace(/\s+/g," ")
    .trim();

  const correct=wordsOf(cur).join(" ");

  if(user===correct){
    message.textContent="Correct! 🎉";
    nextBtn.style.display="inline-block";
    speakBtn.style.display="inline-block";
  }else{
    message.textContent="Try again ❌";
  }
}

function shuffleCards(){
  [...answerRow.children].forEach(c=>cardRow.appendChild(c));
  shuffle([...cardRow.children]).forEach(c=>cardRow.appendChild(c));
  message.textContent="";
  nextBtn.style.display="none";
  speakBtn.style.display="none";
}

function nextQ(){
  cur++;
  if(cur<questions.length){
    loadQ();
  }else{
    message.textContent="All Done! 🎊";
    startConfetti();
  }
}

function shuffle(a){
  return [...a].sort(()=>Math.random()-.5);
}

function speak(){
  const u=new SpeechSynthesisUtterance(questions[cur].en);
  u.lang="en-US";
  u.rate=0.7;
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}

loadQ();

function makePDF(){
  const w=window.open("");
  w.document.write(`
  <html><head><style>
  body{font-family:"Hiragino Maru Gothic ProN";padding:24px;}
  h2{text-align:center;margin-bottom:20px;}
  .q{margin-bottom:28px;page-break-inside:avoid;}
  .words{font-size:13px;margin:6px 0;}
  .line{border-bottom:1px solid #000;height:24px;margin-top:8px;}
  .answer{margin-bottom:10px;}
  .page-break{page-break-before:always;}
  </style></head><body>
  <h2>Day 5 Writing</h2>
  Name: ____________　Date: ____________<br><br>
  `);

  /* ⭐ 問題ページ */
  questions.forEach((q,i)=>{
    const wds=shuffle(wordsOf(i)).join(" / ");
    w.document.write(`
      <div class="q">
        ${i+1}) ${q.jp}<br>
        <div class="words">${wds}</div>
        <div class="line"></div>
      </div>
    `);
  });

  /* ⭐ 改ページ */
  w.document.write(`
    <div class="page-break"></div>
    <h2>Answer</h2>
  `);

  /* ⭐ 答えページ */
  questions.forEach((q,i)=>{
    w.document.write(`
      <div class="answer">
        ${i+1}) ${q.en}
      </div>
    `);
  });

  w.document.write("</body></html>");
  w.document.close();
  w.print();
}




</script>
</body>
</html>
